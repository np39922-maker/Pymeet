server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Browsers block WebRTC media APIs on plain HTTP LAN addresses. On this
    # local-PC setup, loopback is a browser-trusted secure context without TLS.
    set $redirect_to_localhost 0;
    if ($host != localhost) { set $redirect_to_localhost 1; }
    if ($host = 127.0.0.1) { set $redirect_to_localhost 0; }
    if ($redirect_to_localhost = 1) { return 308 http://localhost:5173$request_uri; }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /socket.io/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400;
    }

    location = /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
